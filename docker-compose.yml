services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: appifylab
      POSTGRES_PASSWORD: appifylab
      POSTGRES_DB: appifylab
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appifylab"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://appifylab:appifylab@db:5432/appifylab
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8008:8008"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend/appifylab
    env_file: ./frontend/appifylab/.env.local
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3002:3002"
    depends_on:
      - backend

volumes:
  pgdata:
